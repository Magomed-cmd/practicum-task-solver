<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      width: 240px;
      margin: 0;
      padding: 14px;
      color: #151515;
      background: #ffffff;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    p {
      margin: 0 0 10px;
      font-size: 13px;
      line-height: 1.4;
      color: #4f4f4f;
    }

    .status {
      margin-bottom: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      background: #f4f4f4;
      font-size: 13px;
      color: #222;
    }

    .status[data-tone="error"] {
      background: #fff1f1;
      color: #a12626;
    }

    .status[data-tone="running"] {
      background: #edf8f1;
      color: #1f6a3a;
    }

    .status[data-tone="stopping"] {
      background: #fff8ea;
      color: #8f5b00;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: #1769ff;
    }

    button[data-mode="stop"] {
      background: #c83434;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .shortcut {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h3>Task Solver</h3>
  <p>Кнопка ниже включает и выключает текущий авто-цикл на активной вкладке Practicum.</p>
  <div id="status" class="status">Проверяю статус...</div>
  <button id="toggle">Загрузка...</button>
  <div class="shortcut">Горячую клавишу можно поменять в chrome://extensions/shortcuts</div>

  <script type="module" src="popup.js"></script>
</body>
</html>
