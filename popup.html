<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      width: 224px;
      margin: 0;
      padding: 14px;
      color: #eaf1fb;
      background:
        radial-gradient(circle at top right, rgba(255, 91, 103, 0.12), transparent 34%),
        linear-gradient(180deg, #0b0f14 0%, #090d12 100%);
    }

    .panel {
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(16, 22, 30, 0.92);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.38);
    }

    .eyebrow {
      margin-bottom: 8px;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(166, 192, 221, 0.65);
    }

    h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    p {
      margin: 10px 0 0;
      font-size: 12px;
      line-height: 1.45;
      color: #8f9bab;
    }

    .status {
      margin: 14px 0 12px;
      padding: 10px 11px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.03);
      font-size: 12px;
      color: #d7e2ef;
    }

    .detail {
      margin: -2px 0 12px;
      min-height: 16px;
      font-size: 11px;
      line-height: 1.45;
      color: #738194;
    }

    .report {
      display: none;
      margin: 0 0 12px;
      padding: 10px 11px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.03);
    }

    .report[data-visible="true"] {
      display: block;
    }

    .report-title {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8fa3bd;
    }

    .report-main {
      margin-top: 5px;
      font-size: 20px;
      line-height: 1;
      font-weight: 700;
      color: #f6fbff;
    }

    .report-meta {
      margin-top: 6px;
      font-size: 11px;
      color: #6f7c8d;
      font-family: "JetBrains Mono", "SFMono-Regular", ui-monospace, monospace;
    }

    .status[data-tone="error"] {
      background: rgba(255, 91, 103, 0.12);
      color: #ff9aa4;
    }

    .status[data-tone="running"] {
      background: rgba(79, 209, 135, 0.12);
      color: #8be7aa;
    }

    .status[data-tone="stopping"] {
      background: rgba(255, 189, 89, 0.12);
      color: #ffcf87;
    }

    button {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: #f6fbff;
      background: linear-gradient(180deg, #182231 0%, #131b27 100%);
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    }

    button:hover:not(:disabled) {
      background: linear-gradient(180deg, #1c2838 0%, #16202d 100%);
      border-color: rgba(97, 185, 255, 0.22);
    }

    button[data-mode="stop"] {
      background: linear-gradient(180deg, #402028 0%, #2a171d 100%);
      border-color: rgba(255, 91, 103, 0.22);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .shortcut {
      margin-top: 10px;
      font-size: 11px;
      color: #6f7c8d;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="eyebrow">Practicum</div>
    <h3>Task Solver</h3>
    <p>Автоцикл для активной вкладки.</p>
    <div id="status" class="status">Проверяю статус...</div>
    <div id="detail" class="detail"></div>
    <div id="report" class="report">
      <div class="report-title">Last Solve</div>
      <div id="report-main" class="report-main"></div>
      <div id="report-meta" class="report-meta"></div>
    </div>
    <button id="toggle">Загрузка...</button>
    <div class="shortcut">Hotkey меняется в chrome://extensions/shortcuts</div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
